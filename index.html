<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Lachine — Collectif Citoyen</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #fcfcfc;
        }
        header {
            background-color: #ffffff;
            border-bottom: 1px solid #eaeaea;
        }
        .nav-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }
        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            color: #111;
            text-decoration: none;
        }
        .lang-toggle {
            text-decoration: none;
            color: #0066cc;
            font-weight: bold;
        }
        .lang-toggle:hover {
            text-decoration: underline;
        }
        .main-content {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        footer {
            max-width: 800px;
            margin: 80px auto 20px auto;
            padding: 20px;
            border-top: 1px solid #eaeaea;
            font-size: 0.9rem;
            color: #666;
            text-align: center;
        }
    </style>
    
    <!-- Script de détection automatique de la langue de l'usager -->
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const userLang = navigator.language || navigator.userLanguage;
        if (userLang.startsWith('en')) {
          const banner = document.createElement('div');
          banner.style.cssText = 'background: #f0f7ff; color: #004085; padding: 12px; text-align: center; border-bottom: 1px solid #b8daff; font-family: sans-serif; font-size: 14px;';
          banner.innerHTML = 'Looking for the English version of Horizon Lachine? <a href="./en/index.html" style="color: #0056b3; font-weight: bold; text-decoration: underline;">Click here</a>.';
          document.body.insertBefore(banner, document.body.firstChild);
        }
      });
    </script>
</head>
<body>

    <header>
        <nav class="nav-container">
            <a href="#" class="logo">Horizon Lachine</a>
            <a href="./en/index.html" class="lang-toggle">English</a>
        </nav>
    </header>

    <main class="main-content">
        <!-- ================================================================= -->
        <!-- SECTION DE CONTENU PRINCIPALE (À modifier lors des prochaines étapes) -->
        
        <h1>Horizon Lachine</h1>
        <p>Bienvenue sur le site du collectif Horizon Lachine. Notre espace est actuellement en construction.</p>
        <p>Nous travaillons activement à mettre en valeur nos espaces publics, notre rive et notre patrimoine collectif.</p>
        
        <!-- Fin de la section de contenu -->
        <!-- ================================================================= -->
    </main>

    <footer>
        <p>© 2026 Horizon Lachine. Tous droits réservés.</p>
    </footer>

</body>
</html>
